<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amit Alerts</title>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Google Fonts: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="alert-container" class="top-right">
        <!-- Alerts will be injected here -->
    </div>
    <div id="menu-wrapper" style="display: none;">
        <div id="menu-container">
            <div class="menu-header">
                <h2><i class="fas fa-bell"></i> Amit Alerts</h2>
                <button id="close-btn"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="menu-body">
                <div class="input-group">
                    <label>אזור התרעה מועדף</label>
                    <p style="font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 5px;">בחר את האזור עבורו תרצה לקבל התרעות בזמן אמת</p>
                    <select id="selected-area">
                        <option value="all">כל האזורים (מומלץ)</option>
                        <!-- Other areas will be injected by JS -->
                    </select>
                </div>
                
                <button id="save-settings-btn" class="primary-btn">
                    <i class="fas fa-save"></i> שמור הגדרות
                </button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
